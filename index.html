<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИЛЬЯ Николаев | Юрист по недвижимости</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #1a365d;
            --bg-light-blue: #e6f0fa; /* Светло-синий фон для имени */
            --bg-orange: #ff9f43;     /* Оранжевый фон для специализации */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            padding: 30px 25px;
            text-align: center;
        }

        .avatar-placeholder {
            width: 70px;
            height: 70px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 20px;
        }

        /* Блок имени и фамилии на светло-синем фоне */
        .name-block {
            background-color: var(--bg-light-blue);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .first-name {
            font-size: 26px;
            color: var(--accent-color);
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .last-name {
            font-size: 18px;
            color: var(--text-main);
            font-weight: 600;
            margin-top: 5px;
        }

        /* Блок специализации на оранжевом фоне */
        .subtitle-block {
            background-color: var(--bg-orange);
            color: #ffffff;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(255, 159, 67, 0.2);
        }

        .qr-container {
            background: #fdfdfd;
            border: 1px solid #eef2f5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: inline-block;
        }

        .qr-container img {
            display: block;
            width: 180px;
            height: 180px;
            margin: 0 auto;
        }

        .qr-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-secondary {
            background-color: #f0f4f8;
            color: var(--accent-color);
        }

        .icon {
            margin-right: 10px;
            font-size: 18px;
        }

        @supports (padding: env(safe-area-inset-bottom)) {
            body {
                padding-bottom: calc(20px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar-placeholder">ИН</div>
    
    <div class="name-block">
        <div class="first-name">Илья</div>
        <div class="last-name">Николаев</div>
    </div>
    
    <div class="subtitle-block">
        Юрист по недвижимости (налогообложение)
    </div>
    
    <div class="qr-container">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://9313351006-bot.github.io/jurist/" alt="QR Контакт">
        <div class="qr-text">Покажите этот код для сканирования</div>
    </div>
    
    <div class="links-container">
        <a href="tel:+79313351006" class="btn btn-primary">
            <span class="icon">📞</span> Позвонить
        </a>
        <a href="mailto:9313351006@mail.ru" class="btn btn-secondary">
            <span class="icon">✉️</span> Написать на почту
        </a>
    </div>
</div>

</body>
</html>
