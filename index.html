<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Николаев Илья Викторович | Налоговый юрист</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #1a365d; /* Строгий темно-синий юридический цвет */
            --accent-hover: #2a4d7c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            padding: 35px 25px;
            text-align: center;
            transition: transform 0.2s;
        }

        .avatar-placeholder {
            width: 80px;
            height: 80px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            margin: 0 auto 20px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 22px;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:active {
            background-color: var(--accent-hover);
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #f0f4f8;
            color: var(--accent-color);
        }

        .btn-secondary:active {
            background-color: #e1e9f0;
            transform: scale(0.98);
        }

        .icon {
            margin-right: 10px;
            font-size: 18px;
        }

        /* Оптимизация для экранов iPhone (Notch и Dynamic Island) */
        @supports (padding: env(safe-area-inset-bottom)) {
            body {
                padding-bottom: calc(20px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar-placeholder">ИН</div>
    
    <h1>Николаев Илья Викторович</h1>
    <div class="subtitle">Юрист по налогообложению</div>
    
    <div class="links-container">
        <a href="tel:+79313351006" class="btn btn-primary">
            <span class="icon">📞</span> Позвонить
        </a>
        
        <a href="mailto:9313351006@mail.ru" class="btn btn-secondary">
            <span class="icon">✉️</span> Написать на почту
        </a>
    </div>
</div>

</body>
</html>
