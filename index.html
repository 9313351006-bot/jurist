<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Николаев Илья Викторович | Налоговый юрист</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #1a365d;
            --accent-hover: #2a4d7c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            padding: 30px 25px;
            text-align: center;
        }

        .avatar-placeholder {
            width: 70px;
            height: 70px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 15px;
        }

        h1 {
            font-size: 20px;
            color: var(--text-main);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .qr-container {
            background: #fdfdfd;
            border: 1px solid #eef2f5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: inline-block;
        }

        .qr-container img {
            display: block;
            width: 180px;
            height: 180px;
            margin: 0 auto;
        }

        .qr-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-secondary {
            background-color: #f0f4f8;
            color: var(--accent-color);
        }

        .icon {
            margin-right: 10px;
            font-size: 18px;
        }

        @supports (padding: env(safe-area-inset-bottom)) {
            body {
                padding-bottom: calc(20px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar-placeholder">ИН</div>
    
    <h1>Николаев Илья Викторович</h1>
    <div class="subtitle">Юрист по налогообложению</div>
    
    <div class="qr-container">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://9313351006-bot.github.io/jurist/" alt="QR Контакт">
        <div class="qr-text">Покажите этот код для сканирования</div>
    </div>
    
    <div class="links-container">
        <a href="tel:+79313351006" class="btn btn-primary">
            <span class="icon">📞</span> Позвонить
        </a>
        <a href="mailto:9313351006@mail.ru" class="btn btn-secondary">
            <span class="icon">✉️</span> Написать на почту
        </a>
    </div>
</div>

</body>
</html>
